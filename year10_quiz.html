<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aria Revision">
<meta name="theme-color" content="#1a1040">
<title>Aria's Revision Quiz</title>
<style>
  :root {
    --purple: #534AB7; --purple-light: #8B83E0; --purple-dark: #26215C;
    --bg: #0e0b2e; --surface: #1a1550; --surface2: #241d6a; --surface3: #2e2680;
    --text: #f0eeff; --text2: #b0a8e0; --text3: #7870b0;
    --border: rgba(255,255,255,0.1);
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bottom: env(safe-area-inset-bottom, 20px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; min-height: -webkit-fill-available;
    overflow: hidden; position: fixed; width: 100%; height: 100%;
  }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity 0.25s, transform 0.25s; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

  /* HOME */
  #home { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); background: linear-gradient(160deg, #1a1040 0%, #0e0b2e 60%); overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .home-header { padding: 24px 24px 8px; }
  .app-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
  .app-sub { font-size: 14px; color: var(--text2); margin-top: 4px; }
  .exam-countdown { margin: 16px 24px; background: var(--surface); border-radius: 16px; padding: 16px; border: 1px solid var(--border); }
  .countdown-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
  .countdown-days { font-size: 36px; font-weight: 700; color: var(--purple-light); line-height: 1; margin: 4px 0 2px; }
  .countdown-sub { font-size: 13px; color: var(--text2); }
  .section-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; padding: 20px 24px 10px; }
  .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 24px 32px; }
  .subject-card { background: var(--surface); border-radius: 16px; padding: 16px; border: 1px solid var(--border); cursor: pointer; transition: transform 0.15s; position: relative; overflow: hidden; -webkit-user-select: none; user-select: none; }
  .subject-card:active { transform: scale(0.96); }
  .subject-card.focus-subject { border-color: rgba(240,153,123,0.4); }
  .subject-card::before { content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 60px; border-radius: 0 16px 0 60px; opacity: 0.15; }
  .sc-maths::before { background: #8B83E0; }
  .sc-biology::before { background: #5DCAA5; }
  .sc-chemistry::before { background: #7EC8E3; }
  .sc-physics::before { background: #B088F9; }
  .sc-computing::before { background: #85B7EB; }
  .sc-english::before { background: #FAC775; }
  .sc-business::before { background: #F0997B; }
  .sc-catala::before { background: #ED93B1; }
  .sc-castella::before { background: #97C459; }
  .subject-icon { font-size: 24px; margin-bottom: 10px; }
  .subject-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .subject-count { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .focus-badge { display: inline-block; font-size: 10px; background: rgba(240,153,123,0.2); color: #F0997B; border-radius: 6px; padding: 2px 6px; margin-top: 6px; font-weight: 600; }
  .mini-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 2px; background: var(--purple-light); transition: width 0.3s; }

  /* QUIZ */
  #quiz { background: var(--bg); padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
  .quiz-nav { display: flex; align-items: center; padding: 12px 20px; gap: 12px; }
  .back-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: none; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .quiz-subject-name { font-size: 16px; font-weight: 600; flex: 1; }
  .streak-pill { background: rgba(250,206,122,0.15); color: #FAC775; font-size: 13px; font-weight: 600; padding: 5px 10px; border-radius: 20px; display: none; align-items: center; gap: 4px; }
  .streak-pill.show { display: flex; }
  .quiz-progress-bar { height: 3px; background: var(--surface2); margin: 0 20px 16px; border-radius: 2px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: var(--purple-light); border-radius: 2px; transition: width 0.4s; }
  .score-row { display: flex; gap: 8px; padding: 0 20px 16px; }
  .score-pill { flex: 1; background: var(--surface); border-radius: 10px; padding: 8px; text-align: center; border: 1px solid var(--border); }
  .score-pill .val { font-size: 20px; font-weight: 700; display: block; }
  .score-pill .lbl { font-size: 11px; color: var(--text3); }
  .score-pill.c-correct .val { color: #97C459; }
  .score-pill.c-wrong .val { color: #F0997B; }
  .score-pill.c-left .val { color: var(--purple-light); }
  .card-viewport { flex: 1; display: flex; align-items: center; justify-content: center; padding: 0 20px; perspective: 1200px; }
  .card-outer { width: 100%; max-width: 380px; height: 260px; cursor: pointer; -webkit-user-select: none; user-select: none; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: 24px; backface-visibility: hidden; -webkit-backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 24px; text-align: center; border: 1px solid var(--border); }
  .card-front { background: var(--surface); }
  .card-back { background: var(--surface2); transform: rotateY(180deg); }
  .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 16px; }
  .card-question { font-size: 18px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .card-answer { font-size: 15px; color: var(--text); line-height: 1.6; font-weight: 500; }
  .card-hint { font-size: 12px; color: var(--text3); margin-top: 14px; line-height: 1.4; }
  .tap-to-flip { text-align: center; font-size: 13px; color: var(--text3); padding: 12px 0 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .action-row { display: none; gap: 10px; padding: 8px 20px; padding-bottom: calc(8px + var(--safe-bottom)); }
  .action-row.show { display: flex; }
  .action-btn { flex: 1; padding: 16px 8px; border-radius: 16px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: transform 0.1s; -webkit-user-select: none; }
  .action-btn:active { transform: scale(0.95); }
  .btn-wrong { background: rgba(163,45,45,0.2); color: #F0997B; }
  .btn-skip { background: var(--surface); color: var(--text3); flex: 0.6; }
  .btn-correct { background: rgba(59,109,17,0.2); color: #97C459; }

  /* DONE */
  #done { background: var(--bg); padding: var(--safe-top) 24px var(--safe-bottom); align-items: center; justify-content: center; }
  .done-circle { width: 140px; height: 140px; border-radius: 50%; background: var(--surface); border: 3px solid var(--purple); display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 28px; }
  .done-pct { font-size: 42px; font-weight: 800; color: var(--purple-light); line-height: 1; }
  .done-pct-label { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .done-subject-name { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .done-msg { font-size: 15px; color: var(--text2); text-align: center; line-height: 1.5; margin-bottom: 32px; max-width: 280px; }
  .done-stats { display: flex; gap: 12px; margin-bottom: 32px; width: 100%; max-width: 300px; }
  .done-stat { flex: 1; text-align: center; background: var(--surface); border-radius: 14px; padding: 14px 8px; border: 1px solid var(--border); }
  .done-stat .v { font-size: 24px; font-weight: 700; }
  .done-stat .l { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .done-stat.cc .v { color: #97C459; }
  .done-stat.cw .v { color: #F0997B; }
  .done-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 300px; }
  .done-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
  .done-btn:active { transform: scale(0.97); }
  .done-btn-primary { background: var(--purple); color: white; }
  .done-btn-secondary { background: var(--surface); color: var(--text2); }

  .toast { position: fixed; bottom: calc(120px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(30,25,70,0.95); color: var(--text); font-size: 14px; font-weight: 600; padding: 10px 20px; border-radius: 20px; border: 1px solid var(--border); opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HOME -->
<div class="screen" id="home">
  <div class="home-header">
    <div class="app-title">Aria's Revision</div>
    <div class="app-sub">Year 10 · BSB Barcelona · Exams 26–29 May</div>
  </div>
  <div class="exam-countdown">
    <div class="countdown-label">Time until first exam</div>
    <div class="countdown-days" id="countdown-days">—</div>
    <div class="countdown-sub" id="countdown-sub"></div>
  </div>
  <div class="section-label">Pick a subject</div>
  <div class="subject-grid" id="subject-grid"></div>
</div>

<!-- QUIZ -->
<div class="screen hidden" id="quiz">
  <div class="quiz-nav">
    <button class="back-btn" onclick="goHome()">‹</button>
    <div class="quiz-subject-name" id="quiz-subject-name"></div>
    <div class="streak-pill" id="streak-pill">🔥 <span id="streak-num">0</span></div>
  </div>
  <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-progress"></div></div>
  <div class="score-row">
    <div class="score-pill c-correct"><span class="val" id="s-correct">0</span><span class="lbl">correct</span></div>
    <div class="score-pill c-wrong"><span class="val" id="s-wrong">0</span><span class="lbl">wrong</span></div>
    <div class="score-pill c-left"><span class="val" id="s-left">0</span><span class="lbl">left</span></div>
  </div>
  <div class="card-viewport">
    <div class="card-outer" id="card-outer" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face card-front">
          <div class="card-label" id="card-label">question</div>
          <div class="card-question" id="card-question">Loading…</div>
        </div>
        <div class="card-face card-back">
          <div class="card-label">answer</div>
          <div class="card-answer" id="card-answer"></div>
          <div class="card-hint" id="card-hint"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="tap-to-flip" id="tap-hint"><span>tap card to reveal</span></div>
  <div class="action-row" id="action-row">
    <button class="action-btn btn-wrong" onclick="markWrong()">✗ Wrong</button>
    <button class="action-btn btn-skip" onclick="nextCard()">Skip</button>
    <button class="action-btn btn-correct" onclick="markCorrect()">✓ Right</button>
  </div>
</div>

<!-- DONE -->
<div class="screen hidden" id="done">
  <div class="done-circle">
    <div class="done-pct" id="done-pct">0%</div>
    <div class="done-pct-label">correct</div>
  </div>
  <div class="done-subject-name" id="done-subject-name"></div>
  <div class="done-msg" id="done-msg"></div>
  <div class="done-stats">
    <div class="done-stat cc"><div class="v" id="done-correct">0</div><div class="l">correct</div></div>
    <div class="done-stat cw"><div class="v" id="done-wrong">0</div><div class="l">wrong</div></div>
  </div>
  <div class="done-btns">
    <button class="done-btn done-btn-primary" onclick="retryWrong()">Retry wrong ones</button>
    <button class="done-btn done-btn-secondary" onclick="goHome()">Choose subject</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUBJECTS = {

  maths: {
    name: "Maths", icon: "📐", focus: true, cls: "sc-maths",
    cards: [
      { q: "What is the quadratic formula?", a: "x = (−b ± √(b²−4ac)) / 2a", hint: "Used when you can't factorise easily" },
      { q: "Factorise and solve: x² + 5x + 6 = 0", a: "(x+2)(x+3) = 0  →  x = −2 or x = −3", hint: "Find two numbers that multiply to 6 and add to 5" },
      { q: "Complete the square for x² + 6x", a: "(x + 3)² − 9", hint: "Halve the middle term, square it, then subtract" },
      { q: "Solve by completing the square: x² + 4x − 5 = 0", a: "(x+2)² − 9 = 0  →  x = 1 or x = −5", hint: "Turning point is at (−2, −9)" },
      { q: "Circle theorem: angle at centre vs circumference?", a: "Angle at centre = 2 × angle at circumference (same arc)", hint: "The centre angle is always double" },
      { q: "Angles in a cyclic quadrilateral?", a: "Opposite angles add up to 180°", hint: "All 4 vertices on the circle" },
      { q: "Tangent-radius theorem?", a: "A tangent meets a radius at exactly 90°", hint: "This is one you must always apply first" },
      { q: "Angles in the same segment are…?", a: "Equal — angles subtended by the same arc are equal", hint: "Both angles 'see' the same chord from the same side" },
      { q: "Alternate segment theorem?", a: "Angle between tangent and chord = inscribed angle in the alternate segment", hint: "The angle 'flips' across the chord into the other arc" },
      { q: "Simplify √72", a: "6√2", hint: "72 = 36 × 2 and √36 = 6" },
      { q: "Simplify √12 + √27", a: "2√3 + 3√3 = 5√3", hint: "Simplify each surd first, then add like terms" },
      { q: "Expand (3 + √5)(3 − √5)", a: "9 − 5 = 4", hint: "Difference of two squares: a² − b²" },
      { q: "Rationalise the denominator: 6/√3", a: "6√3/3 = 2√3", hint: "Multiply top and bottom by √3" },
      { q: "Rationalise: 1/(2+√3)", a: "(2−√3)/((4−3)) = 2−√3", hint: "Multiply by the conjugate (2−√3)" },
      { q: "On a distance-time graph, what does the gradient represent?", a: "Speed — steeper gradient = faster speed", hint: "A flat line means the object is stationary" },
      { q: "On a speed-time graph, what does the area under the line represent?", a: "Distance travelled", hint: "Gradient on speed-time graph = acceleration" },
      { q: "Volume of a cone?", a: "V = ⅓πr²h", hint: "One third of a cylinder" },
      { q: "Curved surface area of a cone?", a: "πrl  (where l = slant height)", hint: "Total SA = πrl + πr²" },
      { q: "What is a frustum and how do you find its volume?", a: "A cone with its top cut off. Volume = big cone − small cone", hint: "Work out both cones separately, then subtract" },
      { q: "Pythagoras theorem?", a: "a² + b² = c²  (c is the hypotenuse)", hint: "Only works in right-angled triangles" },
      { q: "SOH CAH TOA — what does each part mean?", a: "Sin=Opp/Hyp  ·  Cos=Adj/Hyp  ·  Tan=Opp/Adj", hint: "Some Old Horses Canter And Hunt Till Old Age" },
      { q: "Area of a triangle using the sine rule?", a: "Area = ½ab sin C", hint: "a and b are two sides, C is the angle between them" },
      { q: "Sine rule — state it", a: "a/sin A = b/sin B = c/sin C", hint: "Use when you have an angle and its opposite side" },
      { q: "Cosine rule — state it", a: "a² = b² + c² − 2bc cos A", hint: "Use when you have 3 sides or 2 sides + included angle" },
      { q: "Speed, density and pressure formulas?", a: "Speed = D÷T  ·  Density = M÷V  ·  Pressure = F÷A", hint: "All three use the same triangle method" },
      { q: "Equation of a line parallel to y = 3x + 1 passing through (0, 5)?", a: "y = 3x + 5", hint: "Parallel lines have the same gradient" },
      { q: "Gradient of a line perpendicular to gradient 2?", a: "−½", hint: "Perpendicular gradients multiply to −1" },
      { q: "What does f(x) notation mean? Find f(3) if f(x) = 2x² − 1", a: "f(x) means 'function of x'. f(3) = 2(9)−1 = 17", hint: "Substitute x = 3 into the expression" },
      { q: "How do you find a composite function fg(x)?", a: "Apply g first, then f: fg(x) = f(g(x))", hint: "Work from right to left" },
    ]
  },

  biology: {
    name: "Biology", icon: "🧬", focus: true, cls: "sc-biology",
    cards: [
      { q: "Beth yw swyddogaeth y mitocondria?", a: "Lleoliad resbiradaeth aerobig — cynhyrchu ATP (egni) ar gyfer y gell", hint: "Yn aml gelwir yn 'bwerdy'r gell'" },
      { q: "What are the levels of organisation in a multicellular organism?", a: "Cell → Tissue → Organ → Organ system → Organism", hint: "Cells with same function group into tissues" },
      { q: "What is the difference between prokaryotic and eukaryotic cells?", a: "Prokaryotic: no nucleus, no membrane-bound organelles (e.g. bacteria). Eukaryotic: has nucleus and organelles (animals, plants)", hint: "Pro = before nucleus; Eu = true nucleus" },
      { q: "Word equation for aerobic respiration?", a: "Glucose + oxygen → carbon dioxide + water  (+energy)", hint: "Releases energy for all life processes" },
      { q: "Word equation for anaerobic respiration (in animals)?", a: "Glucose → lactic acid  (+small amount of energy)", hint: "No oxygen needed — causes muscle fatigue" },
      { q: "Word equation for photosynthesis?", a: "Carbon dioxide + water → glucose + oxygen  (light energy)", hint: "Happens in chloroplasts using chlorophyll" },
      { q: "What are the three types of blood vessels and their functions?", a: "Arteries: carry blood away from heart. Veins: carry blood to heart. Capillaries: exchange substances with tissues", hint: "Arteries have thick walls; veins have valves" },
      { q: "What is the cardiac cycle?", a: "The sequence of events in one heartbeat: atria fill → atria contract → ventricles contract → rest (diastole)", hint: "Controlled by electrical signals from the SAN (pacemaker)" },
      { q: "How does the gas exchange system work in the alveoli?", a: "Oxygen diffuses from alveoli into blood; CO₂ diffuses from blood into alveoli. Large SA, thin walls, good blood supply maximise diffusion.", hint: "Millions of alveoli = massive surface area" },
      { q: "What is osmosis?", a: "Movement of water molecules across a semi-permeable membrane from a region of high water potential to low water potential", hint: "Water moves down its concentration gradient" },
      { q: "What is diffusion?", a: "Net movement of particles from a region of high concentration to low concentration down a concentration gradient", hint: "Passive process — no energy required" },
      { q: "What are enzymes and how do they work?", a: "Biological catalysts (proteins) that speed up reactions. The substrate fits the active site (lock and key model)", hint: "Denatured by high temperature or wrong pH" },
      { q: "What are the main biological molecules and their monomers?", a: "Carbohydrates (glucose), proteins (amino acids), lipids (glycerol + fatty acids), DNA (nucleotides)", hint: "Monomers join to form polymers" },
      { q: "How do plants transport water and minerals?", a: "Xylem transports water and minerals from roots to leaves (transpiration pull). Phloem transports sugars from leaves to rest of plant.", hint: "Xylem = one-way; phloem = two-way" },
      { q: "What is excretion in humans?", a: "Removal of metabolic waste products: CO₂ (lungs), urea (kidneys via urine), excess water and salts (sweat)", hint: "Egestion (faeces) is NOT excretion" },
      { q: "What are the limiting factors of photosynthesis?", a: "Light intensity, CO₂ concentration, temperature — any one can limit the rate even if others are optimal", hint: "A graph plateau = another factor is now limiting" },
    ]
  },

  chemistry: {
    name: "Chemistry", icon: "⚗️", focus: true, cls: "sc-chemistry",
    cards: [
      { q: "What is covalent bonding?", a: "Sharing of electron pairs between non-metal atoms. Each atom contributes one electron to the shared pair.", hint: "Examples: H₂O, CO₂, CH₄" },
      { q: "Properties of Group 1 (alkali metals) — name 3", a: "Soft metals, low melting points, react vigorously with water to form alkali + hydrogen, reactivity increases down the group", hint: "Li, Na, K, Rb, Cs, Fr" },
      { q: "Properties of Group 7 (halogens) — name 3", a: "Non-metals, diatomic molecules, coloured, reactivity decreases down the group, displace less reactive halogens", hint: "F₂, Cl₂, Br₂, I₂" },
      { q: "What are the main gases in the atmosphere and their percentages?", a: "Nitrogen ~78%, Oxygen ~21%, Argon ~0.9%, Carbon dioxide ~0.04%", hint: "Mostly N₂ and O₂ — remember 78/21" },
      { q: "What is the reactivity series? Name 5 metals in order.", a: "Potassium > Sodium > Calcium > Magnesium > Aluminium > Zinc > Iron > Copper", hint: "KSCMAZIC: King Sven Can Make All Zinc In Copper" },
      { q: "How do you balance the equation for burning methane?", a: "CH₄ + 2O₂ → CO₂ + 2H₂O", hint: "Count atoms on each side — H needs 2 water molecules" },
      { q: "What is the test for CO₂ gas?", a: "Bubble through limewater — it turns milky/cloudy", hint: "The precipitate formed is calcium carbonate" },
      { q: "How do you prepare a salt by neutralisation?", a: "Add excess insoluble base/alkali to acid, filter, evaporate solution to crystallise the salt", hint: "Acid + base → salt + water" },
      { q: "What is the test for hydrogen gas?", a: "Lit splint — squeaky pop", hint: "H₂ burns rapidly and explosively" },
      { q: "What is the test for oxygen gas?", a: "Glowing splint — relights", hint: "Oxygen supports combustion" },
      { q: "What are alkanes? Give an example and their general formula.", a: "Saturated hydrocarbons. General formula CₙH₂ₙ₊₂. Example: methane CH₄, ethane C₂H₆", hint: "Single C-C bonds only — no double bonds" },
      { q: "What are alkenes? How are they different from alkanes?", a: "Unsaturated hydrocarbons with at least one C=C double bond. General formula CₙH₂ₙ. More reactive than alkanes.", hint: "Test with bromine water — alkenes decolourise it" },
      { q: "What is crude oil and how is it separated?", a: "A mixture of hydrocarbons formed from ancient marine organisms. Separated by fractional distillation based on boiling points.", hint: "Shorter chains = lower boiling point = collected higher up" },
      { q: "What is metallic bonding?", a: "A lattice of positive metal ions surrounded by a 'sea' of delocalised electrons. Explains conductivity, malleability and high melting points.", hint: "Electrons are free to move = conducts electricity" },
      { q: "How do you calculate moles?", a: "Moles = mass (g) ÷ relative formula mass (Mr)", hint: "M = mol × Mr  →  triangle: mass on top" },
    ]

// ── COUNTDOWN ──
function updateCountdown() {
  const exam = new Date('2026-05-26T09:00:00');
  const now = new Date();
  const msLeft = exam - now;
  const el = document.getElementById('countdown-days');
  const sub = document.getElementById('countdown-sub');
  if (msLeft <= 0) {
    el.textContent = '🎯';
    sub.textContent = msLeft > -7 * 86400000 ? '¡Exams this week! Good luck Aria!' : '✓ Exams done!';
    return;
  }
  const days = Math.ceil(msLeft / (1000 * 60 * 60 * 24));
  el.textContent = days;
  if (days === 1) sub.textContent = 'day to go — you\'ve got this!';
  else if (days <= 7) sub.textContent = `days to go — final stretch!`;
  else sub.textContent = `days to go · first exam: Business, Català & Computing`;
}

// ── BUILD HOME ──
function buildHome() {
  const grid = document.getElementById('subject-grid');
  grid.innerHTML = '';
  for (const [key, s] of Object.entries(SUBJECTS)) {
    const best = getBest(key);
    const card = document.createElement('div');
    card.className = 'subject-card ' + s.cls + (s.focus ? ' focus-subject' : '');
    card.onclick = () => startSubject(key);
    const barWidth = best !== null ? Math.round(best) : 0;
    card.innerHTML = `
      <div class="subject-icon">${s.icon}</div>
      <div class="subject-name">${s.name}</div>
      <div class="subject-count">${s.cards.length} cartes</div>
      ${s.focus ? '<div class="focus-badge">focus topic</div>' : ''}
      ${best !== null ? `<div class="mini-bar"><div class="mini-bar-fill" style="width:${barWidth}%"></div></div>` : ''}
    `;
    grid.appendChild(card);
  }
}

// ── STORAGE ──
function getBest(key) {
  try { const v = localStorage.getItem('best_' + key); return v !== null ? parseFloat(v) : null; } catch(e) { return null; }
}
function saveBest(key, pct) {
  try { const old = getBest(key); if (old === null || pct > old) localStorage.setItem('best_' + key, pct); } catch(e) {}
}

// ── QUIZ LOGIC ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let currentSubject = null, deck = [], idx = 0, correct = 0, wrong = 0, streak = 0, flipped = false, wrongCards = [];

function startSubject(key) {
  currentSubject = key;
  deck = shuffle(SUBJECTS[key].cards);
  idx = 0; correct = 0; wrong = 0; streak = 0; wrongCards = [];
  showScreen('quiz');
  document.getElementById('quiz-subject-name').textContent = SUBJECTS[key].name;
  showCard();
}

function showCard() {
  if (idx >= deck.length) { showDone(); return; }
  const card = deck[idx];
  document.getElementById('card-label').textContent = SUBJECTS[currentSubject].name;
  document.getElementById('card-question').textContent = card.q;
  document.getElementById('card-answer').textContent = card.a;
  document.getElementById('card-hint').textContent = card.hint ? '💡 ' + card.hint : '';
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('action-row').classList.remove('show');
  document.getElementById('tap-hint').style.display = 'flex';
  flipped = false;
  updateScores();
}

function flipCard() {
  if (!flipped && idx < deck.length) {
    document.getElementById('card-inner').classList.add('flipped');
    document.getElementById('action-row').classList.add('show');
    document.getElementById('tap-hint').style.display = 'none';
    flipped = true;
  }
}

function markCorrect() {
  correct++; streak++;
  const sp = document.getElementById('streak-pill');
  if (streak >= 2) { sp.classList.add('show'); document.getElementById('streak-num').textContent = streak; }
  if (streak === 3) showToast('🔥 3 in a row!');
  if (streak === 5) showToast('⚡ 5 streak — unstoppable!');
  if (streak === 10) showToast('🏆 10 in a row! Amazing!');
  idx++; showCard();
}

function markWrong() {
  wrong++; streak = 0;
  document.getElementById('streak-pill').classList.remove('show');
  wrongCards.push(deck[idx]);
  idx++; showCard();
}

function nextCard() {
  streak = 0;
  document.getElementById('streak-pill').classList.remove('show');
  idx++; showCard();
}

function updateScores() {
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-left').textContent = Math.max(0, deck.length - idx);
  document.getElementById('quiz-progress').style.width = (deck.length > 0 ? (idx / deck.length) * 100 : 0) + '%';
}

function showDone() {
  const total = correct + wrong;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  saveBest(currentSubject, pct);
  document.getElementById('done-pct').textContent = pct + '%';
  document.getElementById('done-subject-name').textContent = SUBJECTS[currentSubject].name;
  document.getElementById('done-correct').textContent = correct;
  document.getElementById('done-wrong').textContent = wrong;
  if (pct >= 90) msg = 'Brilliant round! You really know this material. Keep it up! 🏆';
  else if (pct >= 70) msg = 'Solid work! A couple more rounds will lock this in.';
  else if (pct >= 50) msg = 'Good effort — retry the wrong ones to strengthen those gaps.';
  else msg = 'Keep going — this is where the real learning happens. Retry the wrong ones!';
  document.getElementById('done-msg').textContent = msg;
  buildHome();
  showScreen('done');
}

function retryWrong() {
  if (wrongCards.length === 0) { showToast('No wrong answers to retry!'); goHome(); return; }
  deck = shuffle(wrongCards);
  idx = 0; correct = 0; wrong = 0; streak = 0; wrongCards = [];
  showScreen('quiz'); showCard();
}

function goHome() { showScreen('home'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── SWIPE ──
let touchStartX = 0, touchStartY = 0;
document.getElementById('card-outer').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('card-outer').addEventListener('touchend', e => {
  if (!flipped) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < Math.abs(dy) || Math.abs(dx) < 50) return;
  if (dx > 0) { markCorrect(); showToast('✓ Correct!'); }
  else { markWrong(); showToast('✗ Wrong — will come back'); }
}, { passive: true });

// ── INIT ──
updateCountdown();
buildHome();
</script>
